<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Departure Checklist</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel (Allows JSX in one file) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons & Animations -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
            --color-brand-blue: #0A192F;
            --color-brand-green: #10B981;
            --color-brand-accent: #34D399;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glossy-overlay {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.05) 100%);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body {
            background-color: #0A192F;
            color: #F8FAFC;
            margin: 0;
            font-family: "Plus Jakarta Sans", sans-serif;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading State -->
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
            <div style="width: 40px; height: 40px; border: 4px solid #10B981; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="color: #10B981; font-weight: bold; letter-spacing: 2px;">LOADING CHECKLIST...</p>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Simple Icon Component since Lucide-React is tricky in UMD
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const checklistData = [
            {
                category: "Preparation",
                items: [
                    { id: "prep-1", title: "Restock & Review", details: "Restock essential supplies and double-check reservation details." },
                    { id: "prep-2", title: "Morning Prep", details: "Lay out coffee, breakfast, and travel clothes." }
                ]
            },
            {
                category: "Utilities",
                items: [
                    { id: "util-1", title: "Power Off", details: "Turn off all appliances and heaters." },
                    { id: "util-2", title: "Shore Power", details: "Shut off and disconnect power supply." },
                    { id: "util-3", title: "Water Supply", details: "Disconnect hose and drain excess water." },
                    { id: "util-4", title: "Sewer System", details: "Disconnect sewer hose and rinse." },
                    { id: "util-5", title: "Propane Tanks", details: "Close valves and secure tanks." }
                ]
            },
            {
                category: "Interior",
                items: [
                    { id: "int-1", title: "Countertops", details: "Stow appliances in cabinets or bins." },
                    { id: "int-2", title: "Cabinet Latches", details: "Confirm all drawers and doors are locked." },
                    { id: "int-3", title: "Pet Safety", details: "Secure carriers and remove spillable dishes." }
                ]
            },
            {
                category: "Exterior Seals",
                items: [
                    { id: "vent-1", title: "Skylights", details: "Confirm every skylight is firmly shut." },
                    { id: "vent-2", title: "Window Locks", details: "Latch all windows for travel." },
                    { id: "vent-3", title: "Powered Vents", details: "Switch off and secure vent fans." }
                ]
            },
            {
                category: "Slides & Jacks",
                items: [
                    { id: "slide-1", title: "Slide Path", details: "Clear obstructions before retracting." },
                    { id: "slide-2", title: "Slide Locks", details: "Engage locks after full retraction." },
                    { id: "jack-1", title: "Leveling Jacks", details: "Retract all jacks fully." },
                    { id: "jack-2", title: "Blocks & Pads", details: "Stow jack pads and wheel chocks." }
                ]
            },
            {
                category: "Systems Check",
                items: [
                    { id: "ant-1", title: "Antenna", details: "Lower antenna completely and lock." },
                    { id: "ant-2", title: "Awnings", details: "Retract fully and lock arms." },
                    { id: "light-1", title: "Signal Test", details: "Check blinkers, brakes, and hazards." },
                    { id: "light-4", title: "Tow Connection", details: "Check trailer plug and safety chains." }
                ]
            }
        ];

        function App() {
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('rvChecklistProgress');
                return saved ? JSON.parse(saved) : {};
            });
            const [showConfirmReset, setShowConfirmReset] = useState(false);
            const [activeSection, setActiveSection] = useState(0);

            useEffect(() => {
                localStorage.setItem('rvChecklistProgress', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const toggleItem = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetChecklist = () => {
                setCheckedItems({});
                setShowConfirmReset(false);
            };

            const totalItems = checklistData.reduce((acc, section) => acc + section.items.length, 0);
            const completedItems = Object.values(checkedItems).filter(Boolean).length;
            const progress = (completedItems / totalItems) * 100;

            return (
                <div className="min-h-screen bg-brand-blue text-slate-100 font-sans selection:bg-brand-green/30">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute -top-24 -left-24 w-96 h-96 bg-brand-green/10 rounded-full blur-[120px]" />
                        <div className="absolute top-1/2 -right-24 w-80 h-80 bg-blue-500/10 rounded-full blur-[100px]" />
                    </div>

                    <div className="relative max-w-md mx-auto px-6 pt-12 pb-32">
                        <header className="mb-10">
                            <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-brand-green/10 border border-brand-green/20">
                                    <Icon name="map-pin" size={14} className="text-brand-green" />
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-brand-green">Departure Ready</span>
                                </div>
                                <button onClick={() => setShowConfirmReset(true)} className="p-2 rounded-full hover:bg-white/5 transition-colors text-slate-400">
                                    <Icon name="rotate-ccw" size={18} />
                                </button>
                            </div>
                            <h1 className="text-4xl font-extrabold tracking-tight mb-2">
                                RV <span className="text-brand-green text-glow">Checklist</span>
                            </h1>
                            <p className="text-slate-400 text-sm font-medium">Ensure a safe journey to your next destination.</p>
                        </header>

                        <div className="glass-card rounded-[2rem] p-6 mb-10 relative overflow-hidden">
                            <div className="absolute inset-0 glossy-overlay pointer-events-none" />
                            <div className="relative z-10">
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Journey Status</p>
                                        <h2 className="text-2xl font-bold">{completedItems === totalItems ? "Ready to Roll!" : `${completedItems} of ${totalItems} Done`}</h2>
                                    </div>
                                    <div className="text-right">
                                        <span className="text-4xl font-black text-brand-green leading-none">{Math.round(progress)}%</span>
                                    </div>
                                </div>
                                <div className="h-3 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
                                    <motion.div className="h-full bg-gradient-to-r from-brand-green to-brand-accent shadow-[0_0_15px_rgba(16,185,129,0.4)]" initial={{ width: 0 }} animate={{ width: `${progress}%` }} />
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
                            {checklistData.map((section, idx) => (
                                <button key={section.category} onClick={() => setActiveSection(idx)} className={`whitespace-nowrap px-5 py-2.5 rounded-2xl text-sm font-bold transition-all duration-300 border ${activeSection === idx ? 'bg-brand-green text-brand-blue border-brand-green shadow-lg shadow-brand-green/20 scale-105' : 'bg-white/5 text-slate-400 border-white/5 hover:bg-white/10'}`}>
                                    {section.category}
                                </button>
                            ))}
                        </div>

                        <AnimatePresence mode="wait">
                            <motion.div key={activeSection} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="space-y-4">
                                {checklistData[activeSection].items.map((item) => {
                                    const isChecked = checkedItems[item.id];
                                    return (
                                        <motion.div key={item.id} whileTap={{ scale: 0.98 }} onClick={() => toggleItem(item.id)} className={`glass-card rounded-3xl p-5 cursor-pointer transition-all duration-300 relative overflow-hidden group ${isChecked ? 'border-brand-green/30 bg-brand-green/5' : ''}`}>
                                            <div className="relative z-10 flex items-center gap-5">
                                                <div className={`flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-500 ${isChecked ? 'bg-brand-green text-brand-blue shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'bg-white/5 text-slate-500 group-hover:bg-white/10'}`}>
                                                    {isChecked ? <Icon name="check-circle-2" size={24} /> : <Icon name="circle" size={24} />}
                                                </div>
                                                <div className="flex-1">
                                                    <h3 className={`text-lg font-bold transition-all duration-300 ${isChecked ? 'text-slate-400 line-through opacity-60' : 'text-slate-100'}`}>{item.title}</h3>
                                                    <p className={`text-xs font-medium mt-1 transition-all duration-300 ${isChecked ? 'text-slate-500 line-through opacity-40' : 'text-slate-400'}`}>{item.details}</p>
                                                </div>
                                                <Icon name="chevron-right" size={20} className={`transition-all duration-300 ${isChecked ? 'opacity-0' : 'text-slate-600'}`} />
                                            </div>
                                        </motion.div>
                                    );
                                })}
                            </motion.div>
                        </AnimatePresence>
                    </div>

                    <AnimatePresence>
                        {showConfirmReset && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setShowConfirmReset(false)} className="absolute inset-0 bg-brand-blue/80 backdrop-blur-md" />
                                <motion.div initial={{ scale: 0.9, opacity: 0, y: 20 }} animate={{ scale: 1, opacity: 1, y: 0 }} exit={{ scale: 0.9, opacity: 0, y: 20 }} className="relative glass-card rounded-[2.5rem] p-10 max-w-sm w-full text-center border-white/10 shadow-2xl">
                                    <div className="w-20 h-20 bg-red-500/10 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                        <Icon name="trash-2" size={40} />
                                    </div>
                                    <h2 className="text-2xl font-black mb-3">Clear Progress?</h2>
                                    <p className="text-slate-400 text-sm font-medium mb-10 leading-relaxed">This will uncheck all items. Are you sure you want to start over?</p>
                                    <div className="flex flex-col gap-3">
                                        <button onClick={resetChecklist} className="w-full py-4 rounded-2xl font-bold text-brand-blue bg-red-500 hover:bg-red-600 transition-all active:scale-95 shadow-lg shadow-red-500/20">Yes, Clear All</button>
                                        <button onClick={() => setShowConfirmReset(false)} className="w-full py-4 rounded-2xl font-bold text-slate-300 bg-white/5 hover:bg-white/10 transition-all active:scale-95">Cancel</button>
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
